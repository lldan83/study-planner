<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스터디 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --surface3: #25252f;
    --border: #2e2e3a;
    --border2: #3a3a48;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a70;
    --accent: #7c6af7;
    --accent2: #5a4fd4;
    --accent-soft: rgba(124,106,247,0.12);
    --green: #4ade80;
    --green-soft: rgba(74,222,128,0.1);
    --amber: #fbbf24;
    --amber-soft: rgba(251,191,36,0.1);
    --coral: #f87171;
    --coral-soft: rgba(248,113,113,0.1);
    --teal: #2dd4bf;
    --teal-soft: rgba(45,212,191,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── 레이아웃 ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,19,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }

  .date-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
  }

  .nav {
    display: flex; gap: 4px;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 6px 12px; border-radius: 20px;
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--text2); background: var(--surface2); }
  .nav-btn.active { color: var(--accent); background: var(--accent-soft); }

  .main { flex: 1; padding: 20px; max-width: 720px; margin: 0 auto; width: 100%; }

  /* ── 뷰 ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── 진행률 카드 ── */
  .progress-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  @media (min-width: 480px) {
    .progress-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    position: relative; overflow: hidden;
  }
  .progress-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
  }
  .progress-card.today::before { background: var(--accent); }
  .progress-card.week::before { background: var(--teal); }
  .progress-card.review::before { background: var(--amber); }
  .progress-card.subject::before { background: var(--green); }

  .progress-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .progress-value { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .progress-card.today .progress-value { color: var(--accent); }
  .progress-card.week .progress-value { color: var(--teal); }
  .progress-card.review .progress-value { color: var(--amber); }
  .progress-card.subject .progress-value { color: var(--green); }
  .progress-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .progress-bar-wrap { margin-top: 8px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .progress-card.today .progress-bar { background: var(--accent); }
  .progress-card.week .progress-bar { background: var(--teal); }
  .progress-card.review .progress-bar { background: var(--amber); }

  /* ── 섹션 ── */
  .section { margin-bottom: 20px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 12px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-badge {
    font-size: 10px; font-family: 'DM Mono', monospace;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 7px; color: var(--text3);
  }

  /* ── 학습 항목 카드 ── */
  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .item-card:hover { border-color: var(--border2); }
  .item-card.carried { border-left: 2px solid var(--amber); }
  .item-card.done { opacity: 0.5; }
  .item-card.done .item-title { text-decoration: line-through; }

  .check-btn {
    width: 20px; height: 20px; min-width: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border2);
    background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; margin-top: 1px;
    color: transparent;
    font-size: 11px;
  }
  .check-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .item-card.done .check-btn {
    background: var(--accent); border-color: var(--accent); color: white;
  }

  .item-body { flex: 1; min-width: 0; }
  .item-subject {
    font-size: 10px; font-weight: 500; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 2px;
  }
  .item-title { font-size: 14px; color: var(--text); line-height: 1.4; }
  .item-meta {
    display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap;
  }
  .item-tag {
    font-size: 10px; font-family: 'DM Mono', monospace;
    border-radius: 4px; padding: 2px 6px;
  }
  .item-tag.review { background: var(--amber-soft); color: var(--amber); }
  .item-tag.new { background: var(--teal-soft); color: var(--teal); }
  .item-tag.carried { background: var(--amber-soft); color: var(--amber); }
  .item-tag.review-n { background: var(--surface2); color: var(--text3); }

  .item-actions {
    display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s;
  }
  .item-card:hover .item-actions { opacity: 1; }
  .item-action-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 13px; padding: 4px;
    border-radius: 4px; transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .item-action-btn:hover { color: var(--text); background: var(--surface3); }

  .carried-label {
    font-size: 10px; color: var(--amber);
    display: flex; align-items: center; gap: 3px;
  }

  /* ── 학습 기록 입력 ── */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }
  .add-card-title {
    font-size: 12px; color: var(--text3); margin-bottom: 12px;
    font-weight: 500;
  }
  .input-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }

  .input-subject {
    flex: 0 0 auto;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm);
    padding: 9px 12px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: border-color 0.15s;
    min-width: 100px;
  }
  .input-subject:focus { outline: none; border-color: var(--accent); }

  .input-text {
    flex: 1; min-width: 200px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm);
    padding: 9px 12px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.15s;
  }
  .input-text::placeholder { color: var(--text3); }
  .input-text:focus { outline: none; border-color: var(--accent); }

  .btn-add {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 9px 18px; font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .btn-add:hover { background: var(--accent2); }
  .btn-add:active { transform: scale(0.98); }

  .ebbinghaus-hint {
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 4px;
  }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center; padding: 32px 16px;
    color: var(--text3); font-size: 13px;
  }
  .empty-state-icon { font-size: 28px; margin-bottom: 8px; }

  /* ── 날짜 넘김 팝업 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 24px;
    width: 100%; max-width: 440px;
    max-height: 80vh; overflow-y: auto;
    transform: translateY(8px); transition: transform 0.2s;
  }
  .modal-overlay.show .modal { transform: translateY(0); }

  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px; }

  .modal-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .modal-item-title { font-size: 13px; margin-bottom: 8px; }
  .modal-item-subject { font-size: 10px; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
  .modal-item-btns { display: flex; gap: 6px; }
  .modal-item-btn {
    flex: 1; padding: 7px; border-radius: 6px;
    border: 1px solid var(--border2); background: none;
    color: var(--text2); font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .modal-item-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-item-btn.done-btn:hover { border-color: var(--green); color: var(--green); }

  .modal-footer { margin-top: 16px; display: flex; justify-content: flex-end; }
  .btn-confirm {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 9px 20px; font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  /* ── 설정 뷰 ── */
  .settings-section { margin-bottom: 24px; }
  .settings-section-title {
    font-size: 11px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .subject-list { display: flex; flex-direction: column; gap: 6px; }
  .subject-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .subject-name { font-size: 13px; }
  .subject-color { width: 8px; height: 8px; border-radius: 50%; }
  .subject-del {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 13px; padding: 4px;
    transition: color 0.15s;
  }
  .subject-del:hover { color: var(--coral); }

  .subject-add-row {
    display: flex; gap: 8px; margin-top: 8px;
  }
  .input-small {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm);
    padding: 8px 12px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .input-small:focus { outline: none; border-color: var(--accent); }
  .btn-small {
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    padding: 8px 14px; font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }

  /* 강의 계산기 */
  .lecture-calc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .lecture-calc-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .lecture-result {
    background: var(--accent-soft);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px; color: var(--accent);
    margin-top: 4px;
  }

  /* ── 토스트 ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--surface3); border: 1px solid var(--border2);
    border-radius: 20px; padding: 8px 16px;
    font-size: 12px; color: var(--text2);
    z-index: 300; transition: transform 0.25s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .header { padding: 0 14px; }
    .main { padding: 14px; }
    .nav-btn { padding: 6px 8px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header class="header">
    <div class="header-left">
      <div class="logo">스터디<span>.</span></div>
      <div class="date-chip" id="dateChip">로딩 중...</div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showView('today')">오늘</button>
      <button class="nav-btn" onclick="showView('settings')">설정</button>
    </nav>
  </header>

  <main class="main">

    <!-- ── 오늘 뷰 ── -->
    <div class="view active" id="view-today">

      <!-- 진행률 카드 -->
      <div class="progress-grid">
        <div class="progress-card today">
          <div class="progress-label">오늘 학습</div>
          <div class="progress-value" id="stat-today-val">0/0</div>
          <div class="progress-sub">완료 / 전체</div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="stat-today-bar" style="width:0%"></div></div>
        </div>
        <div class="progress-card week">
          <div class="progress-label">이번 주</div>
          <div class="progress-value" id="stat-week-val">0%</div>
          <div class="progress-sub">주간 달성률</div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="stat-week-bar" style="width:0%"></div></div>
        </div>
        <div class="progress-card review">
          <div class="progress-label">복습 완료</div>
          <div class="progress-value" id="stat-review-val">0/0</div>
          <div class="progress-sub">이번 달</div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="stat-review-bar" style="width:0%"></div></div>
        </div>
        <div class="progress-card subject">
          <div class="progress-label">전체 진도</div>
          <div class="progress-value" id="stat-total-val">0%</div>
          <div class="progress-sub">전 과목 평균</div>
        </div>
      </div>

      <!-- 학습 기록 입력 -->
      <div class="add-card">
        <div class="add-card-title">오늘 학습 기록 추가</div>
        <div class="input-row">
          <select class="input-subject" id="newSubject">
            <option value="">과목 선택</option>
          </select>
          <input class="input-text" id="newContent" placeholder="예: 3단원 2강~4강 / Day 12~15 단어" />
          <button class="btn-add" onclick="addStudyRecord()">+ 추가</button>
        </div>
        <div class="ebbinghaus-hint">↻ 추가하면 +1, +3, +7, +14, +28일 복습 일정이 자동 생성돼요</div>
      </div>

      <!-- 이월 항목 -->
      <div class="section" id="section-carried" style="display:none">
        <div class="section-header">
          <div class="section-title">
            📌 이월된 항목
            <span class="section-badge" id="badge-carried">0</span>
          </div>
        </div>
        <div id="list-carried"></div>
      </div>

      <!-- 복습 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">
            ↻ 오늘 복습
            <span class="section-badge" id="badge-review">0</span>
          </div>
        </div>
        <div id="list-review">
          <div class="empty-state">
            <div class="empty-state-icon">✓</div>
            오늘 복습할 항목이 없어요
          </div>
        </div>
      </div>

      <!-- 오늘 학습 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">
            ✦ 오늘 학습
            <span class="section-badge" id="badge-study">0</span>
          </div>
        </div>
        <div id="list-study">
          <div class="empty-state">
            <div class="empty-state-icon">＋</div>
            위에서 오늘 학습을 추가해보세요
          </div>
        </div>
      </div>

    </div><!-- /view-today -->

    <!-- ── 설정 뷰 ── -->
    <div class="view" id="view-settings">

      <div class="settings-section">
        <div class="settings-section-title">과목 관리</div>
        <div class="subject-list" id="subjectList"></div>
        <div class="subject-add-row">
          <input class="input-small" id="newSubjectName" placeholder="과목명 입력 (예: 수학)" />
          <button class="btn-small" onclick="addSubject()">추가</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">강의 완강 계산기</div>
        <div class="lecture-calc">
          <div class="lecture-calc-row">
            <select class="input-small" id="calcSubject" style="flex:0 0 auto; min-width:100px">
              <option value="">과목 선택</option>
            </select>
            <input class="input-small" id="calcTotal" type="number" placeholder="총 강의수" style="width:100px; flex:0 0 auto" />
            <input class="input-small" id="calcDone" type="number" placeholder="완강한 강의수" style="width:120px; flex:0 0 auto" />
          </div>
          <div class="lecture-calc-row">
            <input class="input-small" id="calcTarget" type="date" style="flex:1" />
            <button class="btn-small" onclick="calcLectures()">계산</button>
          </div>
          <div class="lecture-result" id="calcResult" style="display:none"></div>
        </div>
      </div>

    </div><!-- /view-settings -->

  </main>
</div><!-- /app -->

<!-- 날짜 넘김 모달 -->
<div class="modal-overlay" id="carryModal">
  <div class="modal">
    <div class="modal-title">✋ 어제 미완료 항목이 있어요</div>
    <div class="modal-sub">각 항목을 실제로 했는지 확인해주세요</div>
    <div id="carryModalList"></div>
    <div class="modal-footer">
      <button class="btn-confirm" onclick="confirmCarry()">확인</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

  messagingSenderId: "493466863153",
  appId: "1:493466863153:web:e57912f498a49c45cc3710",

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 한국 날짜 ──
function getKSTDateStr() {
  const now = new Date();
  const kst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
  return kst.toISOString().slice(0, 10);
}

function getKSTDateObj(dateStr) {
  return new Date(dateStr + 'T00:00:00+09:00');
}

function addDays(dateStr, days) {
  const d = getKSTDateObj(dateStr);
  d.setDate(d.getDate() + days);
  const kst = new Date(d.getTime() + (9 * 60 * 60 * 1000));
  return kst.toISOString().slice(0, 10);
}

function formatDateKo(dateStr) {
  const d = getKSTDateObj(dateStr);
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

// ── 전역 상태 ──
let subjects = [];
let todayRecords = [];
let reviewItems = [];
let carriedItems = [];
const TODAY = getKSTDateStr();
const EBBINGHAUS = [1, 3, 7, 14, 28];

// 날짜 표시
document.getElementById('dateChip').textContent = formatDateKo(TODAY);

// ── 뷰 전환 ──
window.showView = function(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'settings') renderSubjectSettings();
};

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 과목 로드 / 저장 ──
async function loadSubjects() {
  const snap = await get(ref(db, 'subjects'));
  subjects = snap.exists() ? Object.values(snap.val()) : [];
  renderSubjectSelects();
}

async function addSubject() {
  const name = document.getElementById('newSubjectName').value.trim();
  if (!name) return;
  const id = 'subj_' + Date.now();
  const colors = ['#7c6af7','#2dd4bf','#4ade80','#fbbf24','#f87171','#60a5fa'];
  const color = colors[subjects.length % colors.length];
  const subj = { id, name, color };
  await set(ref(db, 'subjects/' + id), subj);
  subjects.push(subj);
  document.getElementById('newSubjectName').value = '';
  renderSubjectSelects();
  renderSubjectSettings();
  showToast('과목이 추가됐어요');
}
window.addSubject = addSubject;

async function deleteSubject(id) {
  await remove(ref(db, 'subjects/' + id));
  subjects = subjects.filter(s => s.id !== id);
  renderSubjectSelects();
  renderSubjectSettings();
  showToast('삭제됐어요');
}
window.deleteSubject = deleteSubject;

function renderSubjectSelects() {
  const opts = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('newSubject').innerHTML = '<option value="">과목 선택</option>' + opts;
  document.getElementById('calcSubject').innerHTML = '<option value="">과목 선택</option>' + opts;
}

function renderSubjectSettings() {
  const list = document.getElementById('subjectList');
  if (!subjects.length) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0">과목을 추가해보세요</div>';
    return;
  }
  list.innerHTML = subjects.map(s => `
    <div class="subject-row">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="subject-color" style="background:${s.color}"></div>
        <span class="subject-name">${s.name}</span>
      </div>
      <button class="subject-del" onclick="deleteSubject('${s.id}')">✕</button>
    </div>
  `).join('');
}

// ── 학습 기록 추가 ──
async function addStudyRecord() {
  const subjId = document.getElementById('newSubject').value;
  const content = document.getElementById('newContent').value.trim();
  if (!subjId || !content) {
    showToast('과목과 내용을 모두 입력해주세요');
    return;
  }
  const subj = subjects.find(s => s.id === subjId);
  const id = 'rec_' + Date.now();
  const record = {
    id, subjId, subjName: subj.name, subjColor: subj.color,
    content, date: TODAY, done: false, type: 'study'
  };

  // 오늘 학습 기록 저장
  await set(ref(db, 'records/' + TODAY + '/' + id), record);

  // 에빙하우스 복습 일정 생성
  for (const days of EBBINGHAUS) {
    const reviewDate = addDays(TODAY, days);
    const reviewId = 'rev_' + id + '_d' + days;
    const reviewItem = {
      id: reviewId, sourceId: id,
      subjId, subjName: subj.name, subjColor: subj.color,
      content, originalDate: TODAY,
      reviewDate, reviewDay: days,
      done: false, type: 'review',
      actualReviewDate: null
    };
    await set(ref(db, 'reviews/' + reviewDate + '/' + reviewId), reviewItem);
  }

  document.getElementById('newContent').value = '';
  showToast(`${subj.name} 기록 추가! 복습 일정 5개 생성됐어요 ↻`);
  loadTodayData();
}
window.addStudyRecord = addStudyRecord;

// ── 오늘 데이터 로드 ──
async function loadTodayData() {
  // 오늘 학습 기록
  const studySnap = await get(ref(db, 'records/' + TODAY));
  todayRecords = studySnap.exists() ? Object.values(studySnap.val()) : [];

  // 오늘 복습 항목
  const reviewSnap = await get(ref(db, 'reviews/' + TODAY));
  reviewItems = reviewSnap.exists() ? Object.values(reviewSnap.val()) : [];

  // 이월 항목 (carried)
  const carriedSnap = await get(ref(db, 'carried/' + TODAY));
  carriedItems = carriedSnap.exists() ? Object.values(carriedSnap.val()) : [];

  renderToday();
  updateStats();
}

// ── 오늘 렌더링 ──
function renderToday() {
  renderStudyList();
  renderReviewList();
  renderCarriedList();
}

function getSubjColor(subjId) {
  const s = subjects.find(x => x.id === subjId);
  return s ? s.color : 'var(--accent)';
}

function renderStudyList() {
  const el = document.getElementById('list-study');
  const badge = document.getElementById('badge-study');
  badge.textContent = todayRecords.length;
  if (!todayRecords.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">＋</div>위에서 오늘 학습을 추가해보세요</div>';
    return;
  }
  el.innerHTML = todayRecords.map(r => itemCardHTML(r, 'study')).join('');
}

function renderReviewList() {
  const el = document.getElementById('list-review');
  const badge = document.getElementById('badge-review');
  badge.textContent = reviewItems.length;
  if (!reviewItems.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✓</div>오늘 복습할 항목이 없어요</div>';
    return;
  }
  el.innerHTML = reviewItems.map(r => itemCardHTML(r, 'review')).join('');
}

function renderCarriedList() {
  const section = document.getElementById('section-carried');
  const el = document.getElementById('list-carried');
  const badge = document.getElementById('badge-carried');
  if (!carriedItems.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  badge.textContent = carriedItems.length;
  el.innerHTML = carriedItems.map(r => itemCardHTML(r, 'carried')).join('');
}

function itemCardHTML(item, context) {
  const color = item.subjColor || getSubjColor(item.subjId);
  const doneClass = item.done ? 'done' : '';
  const carriedClass = context === 'carried' ? 'carried' : '';
  let tagHTML = '';
  if (context === 'review') tagHTML = `<span class="item-tag review">복습 +${item.reviewDay}일</span>`;
  else if (context === 'study') tagHTML = `<span class="item-tag new">신규 학습</span>`;
  else if (context === 'carried') tagHTML = `<span class="item-tag carried">📌 이월</span>`;

  return `
    <div class="item-card ${doneClass} ${carriedClass}" id="card-${item.id}">
      <button class="check-btn" onclick="toggleDone('${item.id}','${context}')">${item.done ? '✓' : ''}</button>
      <div class="item-body">
        <div class="item-subject" style="color:${color}">${item.subjName}</div>
        <div class="item-title">${item.content}</div>
        <div class="item-meta">${tagHTML}</div>
      </div>
      <div class="item-actions">
        <button class="item-action-btn" onclick="deleteItem('${item.id}','${context}')">✕</button>
      </div>
    </div>
  `;
}

// ── 체크 토글 ──
async function toggleDone(id, context) {
  if (context === 'study') {
    const idx = todayRecords.findIndex(r => r.id === id);
    if (idx === -1) return;
    todayRecords[idx].done = !todayRecords[idx].done;
    await update(ref(db, 'records/' + TODAY + '/' + id), { done: todayRecords[idx].done });
    renderStudyList();
  } else if (context === 'review') {
    const idx = reviewItems.findIndex(r => r.id === id);
    if (idx === -1) return;
    const item = reviewItems[idx];
    const nowDone = !item.done;
    reviewItems[idx].done = nowDone;
    await update(ref(db, 'reviews/' + TODAY + '/' + id), { done: nowDone, actualReviewDate: nowDone ? TODAY : null });

    // 방식 A: 실제 복습한 날 기준으로 다음 복습 재계산
    if (nowDone) {
      await rescheduleNextReview(item);
    }
    renderReviewList();
  } else if (context === 'carried') {
    const idx = carriedItems.findIndex(r => r.id === id);
    if (idx === -1) return;
    carriedItems[idx].done = !carriedItems[idx].done;
    await update(ref(db, 'carried/' + TODAY + '/' + id), { done: carriedItems[idx].done });
    renderCarriedList();
  }
  updateStats();
}
window.toggleDone = toggleDone;

// ── 에빙하우스 방식 A: 복습한 날 기준으로 다음 복습 재계산 ──
async function rescheduleNextReview(item) {
  const nextDayIdx = EBBINGHAUS.indexOf(item.reviewDay);
  if (nextDayIdx === -1 || nextDayIdx === EBBINGHAUS.length - 1) return; // 마지막 복습이면 종료
  const nextDays = EBBINGHAUS[nextDayIdx + 1];
  const newReviewDate = addDays(TODAY, nextDays - item.reviewDay);
  // 기존 미래 복습 삭제 후 새 날짜로 이동
  const oldReviewDate = addDays(item.originalDate, nextDays);
  const oldReviewId = 'rev_' + item.sourceId + '_d' + nextDays;
  await remove(ref(db, 'reviews/' + oldReviewDate + '/' + oldReviewId));
  // 새 날짜에 저장
  const newId = 'rev_' + item.sourceId + '_d' + nextDays + '_r';
  await set(ref(db, 'reviews/' + newReviewDate + '/' + newId), {
    ...item,
    id: newId,
    reviewDate: newReviewDate,
    reviewDay: nextDays,
    done: false,
    actualReviewDate: null
  });
}

// ── 항목 삭제 ──
async function deleteItem(id, context) {
  if (context === 'study') {
    await remove(ref(db, 'records/' + TODAY + '/' + id));
    todayRecords = todayRecords.filter(r => r.id !== id);
    renderStudyList();
  } else if (context === 'review') {
    await remove(ref(db, 'reviews/' + TODAY + '/' + id));
    reviewItems = reviewItems.filter(r => r.id !== id);
    renderReviewList();
  } else if (context === 'carried') {
    await remove(ref(db, 'carried/' + TODAY + '/' + id));
    carriedItems = carriedItems.filter(r => r.id !== id);
    renderCarriedList();
  }
  updateStats();
}
window.deleteItem = deleteItem;

// ── 날짜 넘김 처리 ──
async function checkDateRollover() {
  const lastDateSnap = await get(ref(db, 'meta/lastDate'));
  const lastDate = lastDateSnap.exists() ? lastDateSnap.val() : null;
  if (!lastDate || lastDate === TODAY) {
    await set(ref(db, 'meta/lastDate'), TODAY);
    return;
  }

  // 어제 미완료 항목 찾기
  const yesterday = lastDate;
  const [studySnap, reviewSnap] = await Promise.all([
    get(ref(db, 'records/' + yesterday)),
    get(ref(db, 'reviews/' + yesterday))
  ]);

  const unfinished = [];
  if (studySnap.exists()) {
    Object.values(studySnap.val()).filter(r => !r.done).forEach(r => unfinished.push({...r, _context: 'study', _date: yesterday}));
  }
  if (reviewSnap.exists()) {
    Object.values(reviewSnap.val()).filter(r => !r.done).forEach(r => unfinished.push({...r, _context: 'review', _date: yesterday}));
  }

  await set(ref(db, 'meta/lastDate'), TODAY);

  if (!unfinished.length) return;

  showCarryModal(unfinished);
}

function showCarryModal(items) {
  const list = document.getElementById('carryModalList');
  list.innerHTML = items.map(item => `
    <div class="modal-item" id="modal-item-${item.id}">
      <div class="modal-item-subject">${item.subjName} · ${item._context === 'review' ? '복습' : '신규 학습'}</div>
      <div class="modal-item-title">${item.content}</div>
      <div class="modal-item-btns">
        <button class="modal-item-btn" onclick="setCarryChoice('${item.id}','carry', ${JSON.stringify(item).replace(/"/g,"'")})">
          못 했어요 → 오늘로 이동
        </button>
        <button class="modal-item-btn done-btn" onclick="setCarryChoice('${item.id}','done', ${JSON.stringify(item).replace(/"/g,"'")})">
          했는데 체크 못 했어요
        </button>
      </div>
    </div>
  `).join('');
  document.getElementById('carryModal').classList.add('show');
  window._carryChoices = {};
  window._carryItems = items;
}

window.setCarryChoice = function(id, choice, item) {
  window._carryChoices[id] = { choice, item };
  const el = document.getElementById('modal-item-' + id);
  el.style.opacity = '0.5';
  el.querySelectorAll('.modal-item-btn').forEach(b => b.style.opacity = '0.4');
  const chosen = choice === 'carry' ? '→ 오늘로 이동' : '→ 완료 처리';
  el.querySelector('.modal-item-title').textContent += ' ' + chosen;
};

window.confirmCarry = async function() {
  const choices = window._carryChoices || {};
  const items = window._carryItems || [];

  for (const item of items) {
    const choice = choices[item.id]?.choice || 'carry'; // 선택 안 하면 기본 이동
    if (choice === 'done') {
      // 어제 날짜에 완료 처리
      const path = item._context === 'study'
        ? 'records/' + item._date + '/' + item.id
        : 'reviews/' + item._date + '/' + item.id;
      await update(ref(db, path), { done: true });
      if (item._context === 'review') await rescheduleNextReview(item);
    } else {
      // 오늘로 이월
      const carried = { ...item, date: TODAY, carriedFrom: item._date };
      delete carried._context; delete carried._date;
      await set(ref(db, 'carried/' + TODAY + '/' + item.id), carried);
    }
  }

  document.getElementById('carryModal').classList.remove('show');
  loadTodayData();
};

// ── 통계 업데이트 ──
async function updateStats() {
  // 오늘
  const todayAll = [...todayRecords, ...reviewItems, ...carriedItems];
  const todayDone = todayAll.filter(r => r.done).length;
  const todayTotal = todayAll.length;
  document.getElementById('stat-today-val').textContent = `${todayDone}/${todayTotal}`;
  document.getElementById('stat-today-bar').style.width = todayTotal ? `${(todayDone/todayTotal)*100}%` : '0%';

  // 이번 달 복습
  const yearMonth = TODAY.slice(0,7);
  const reviewMonthSnap = await get(ref(db, 'reviews'));
  let revDone = 0, revTotal = 0;
  if (reviewMonthSnap.exists()) {
    const all = reviewMonthSnap.val();
    Object.keys(all).filter(d => d.startsWith(yearMonth)).forEach(d => {
      Object.values(all[d]).forEach(r => {
        if (r.reviewDate <= TODAY) {
          revTotal++;
          if (r.done) revDone++;
        }
      });
    });
  }
  document.getElementById('stat-review-val').textContent = `${revDone}/${revTotal}`;
  document.getElementById('stat-review-bar').style.width = revTotal ? `${(revDone/revTotal)*100}%` : '0%';

  // 이번 주 (월~일)
  const todayObj = getKSTDateObj(TODAY);
  const dayOfWeek = todayObj.getDay();
  const monday = new Date(todayObj); monday.setDate(todayObj.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  let weekDone = 0, weekTotal = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const dStr = d.toISOString().slice(0,10);
    if (dStr > TODAY) break;
    const snap = await get(ref(db, 'records/' + dStr));
    if (snap.exists()) {
      const items = Object.values(snap.val());
      weekTotal += items.length;
      weekDone += items.filter(r => r.done).length;
    }
  }
  const weekPct = weekTotal ? Math.round((weekDone/weekTotal)*100) : 0;
  document.getElementById('stat-week-val').textContent = weekPct + '%';
  document.getElementById('stat-week-bar').style.width = weekPct + '%';

  // 전체 진도 (완료된 학습 기록 수 기준)
  const allRecordsSnap = await get(ref(db, 'records'));
  let allDone = 0, allTotal = 0;
  if (allRecordsSnap.exists()) {
    Object.values(allRecordsSnap.val()).forEach(day => {
      Object.values(day).forEach(r => { allTotal++; if (r.done) allDone++; });
    });
  }
  const totalPct = allTotal ? Math.round((allDone/allTotal)*100) : 0;
  document.getElementById('stat-total-val').textContent = totalPct + '%';
}

// ── 강의 계산기 ──
window.calcLectures = function() {
  const total = parseInt(document.getElementById('calcTotal').value);
  const done = parseInt(document.getElementById('calcDone').value) || 0;
  const targetDate = document.getElementById('calcTarget').value;
  const result = document.getElementById('calcResult');

  if (!total || !targetDate) { showToast('총 강의수와 완강 목표일을 입력해주세요'); return; }

  const remaining = total - done;
  const today = getKSTDateObj(TODAY);
  const target = getKSTDateObj(targetDate);
  const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));

  if (diffDays <= 0) { result.style.display = 'block'; result.textContent = '목표일이 오늘보다 이전이에요'; return; }

  const perDay = (remaining / diffDays).toFixed(1);
  const perDayInt = Math.ceil(remaining / diffDays);

  result.style.display = 'block';
  result.innerHTML = `남은 강의 <b>${remaining}강</b> ÷ <b>${diffDays}일</b> = 하루 <b>${perDayInt}강</b> (약 ${perDay}강)`;
};

// ── 초기화 ──
async function init() {
  await loadSubjects();
  await checkDateRollover();
  await loadTodayData();
}

init();
</script>
