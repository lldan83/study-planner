<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스터디</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f2f1ed;
  --surface3: #e8e7e2;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1c1c1c;
  --text2: #6b6b6b;
  --text3: #ababab;
  --green-deep: #2d6a2d;
  --green-mid: #4a9e4a;
  --green-light: #c8e6c8;
  --green-pale: #eaf4ea;
  --gray-light: #e0dfd9;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(247,246,242,0.94); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px;
}
.logo { font-family: 'Gowun Dodum', sans-serif; font-size: 17px; color: var(--text); }
.nav { display: flex; gap: 2px; }
.nav-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--text3); padding: 5px 12px; border-radius: 20px; transition: all 0.15s;
}
.nav-btn:hover { color: var(--text2); background: var(--surface2); }
.nav-btn.active { color: var(--green-deep); background: var(--green-pale); }
.main { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
.view { display: none; }
.view.active { display: block; }
.today-date { font-size: 12px; color: var(--text3); margin-bottom: 2px; }
.today-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 20px; letter-spacing: -0.5px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
.task-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow);
  padding: 16px 18px; margin-bottom: 10px;
  border-left: 3px solid transparent; transition: box-shadow 0.2s;
}
.task-card.active-card { border: 2px solid var(--green-mid); }
.task-subject { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.task-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
.task-sub { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
.task-spacer { height: 6px; }
.btn-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn-start {
  background: var(--text); color: var(--surface); border: none;
  border-radius: var(--radius-sm); padding: 9px 20px; font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.15s;
}
.btn-start:hover { opacity: 0.82; }
.btn-complete {
  background: var(--green-mid); color: white; border: none;
  border-radius: var(--radius-sm); padding: 9px 20px; font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; flex: 1;
}
.btn-complete:hover { background: var(--green-deep); }
.btn-skip {
  background: none; color: var(--text3); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 9px 14px; font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s;
}
.btn-skip:hover:not([disabled]) { color: var(--text2); }
.btn-skip[disabled] { opacity: 0.3; cursor: not-allowed; }
.skip-count { font-size: 11px; color: var(--text3); }
.skip-out { font-size: 11px; color: #dc2626; }
.queue-item {
  background: var(--surface2); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 11px 14px;
  margin-bottom: 6px; display: flex; align-items: center; gap: 10px; opacity: 0.6;
}
.queue-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.queue-text { font-size: 13px; color: var(--text2); }
.divider { height: 1px; background: var(--border); margin: 18px 0; }
.stats-row { display: flex; margin-bottom: 16px; }
.stat-item { flex: 1; text-align: center; }
.stat-val { font-size: 20px; font-weight: 700; color: var(--text); font-family: 'Gowun Dodum', sans-serif; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.heatmap { display: flex; gap: 5px; }
.hm-day { flex: 1; height: 28px; border-radius: 6px; background: var(--gray-light); }
.hm-day.done { background: var(--green-deep); }
.hm-day.today { background: var(--green-light); border: 2px solid var(--green-mid); }
.hm-labels { display: flex; gap: 5px; margin-top: 4px; }
.hm-label { flex: 1; text-align: center; font-size: 10px; color: var(--text3); }
.empty-state {
  text-align: center; padding: 36px 20px; color: var(--text3); font-size: 13px; line-height: 1.8;
  background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border2);
}
.all-done { text-align: center; padding: 40px 20px; }
.all-done-icon { font-size: 36px; margin-bottom: 12px; }
.all-done-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.all-done-sub { font-size: 13px; color: var(--text3); }
.overview-section { margin-bottom: 24px; }
.overview-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.sp-item { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 13px 15px; margin-bottom: 7px; }
.sp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.sp-name { font-size: 13px; font-weight: 500; }
.sp-count { font-size: 12px; color: var(--text3); }
.sp-bar-bg { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.sp-bar { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.ov-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
.ov-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
.ov-val { font-size: 24px; font-weight: 700; font-family: 'Gowun Dodum', sans-serif; }
.ov-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
.setup-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 14px; }
.sj-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); margin-bottom: 7px; }
.sj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.sj-name { font-size: 13px; font-weight: 500; }
.sj-type { font-size: 11px; color: var(--text3); }
.sj-edit { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 12px; padding: 4px 8px; border-radius: 4px; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
.sj-edit:hover { color: var(--text); background: var(--surface3); }
input, select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif; color: var(--text); transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus { outline: none; border-color: var(--green-mid); }
input::placeholder { color: var(--text3); }
.fg { margin-bottom: 10px; }
.fl { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 4px; }
.btn-main {
  background: var(--text); color: var(--surface); border: none;
  border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.15s; width: 100%; margin-top: 4px;
}
.btn-main:hover { opacity: 0.82; }
.btn-del { background: none; color: #dc2626; border: 1px solid #fca5a5; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; }
.btn-del:hover { background: #fef2f2; }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.cs { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
.cs:hover { transform: scale(1.12); }
.cs.on { border-color: var(--text); }
.modal-bg {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.32);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
  padding: 22px 20px 40px; width: 100%; max-width: 480px;
  max-height: 88vh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.25s ease;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
}
.modal-bg.show .modal { transform: translateY(0); }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-ttl { font-size: 16px; font-weight: 700; }
.modal-x { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text3); padding: 2px; }
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--text); color: var(--surface);
  border-radius: 20px; padding: 9px 18px; font-size: 13px;
  z-index: 300; transition: transform 0.25s; white-space: nowrap;
  box-shadow: var(--shadow-md); pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.calc-result { display:none; margin-top:12px; padding:12px 14px; background:var(--green-pale); border-radius:var(--radius-sm); font-size:13px; color:var(--green-deep); line-height:1.7; }
</style>
</head>
<body>
<header class="header">
  <div class="logo">스터디</div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showView('today',this)">오늘</button>
    <button class="nav-btn" onclick="showView('overview',this)">현황</button>
    <button class="nav-btn" onclick="showView('setup',this)">설정</button>
  </nav>
</header>
<main class="main">
  <div class="view active" id="view-today">
    <div class="today-date" id="todayDate"></div>
    <div class="today-title">오늘 할 것</div>
    <div id="todayContent"></div>
    <div class="divider"></div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-val" id="sStreak">—</div><div class="stat-label">연속 학습</div></div>
      <div class="stat-item"><div class="stat-val" id="sTotal">—</div><div class="stat-label">누적 완료</div></div>
      <div class="stat-item"><div class="stat-val" id="sReview">—</div><div class="stat-label">복습 완료</div></div>
    </div>
    <div class="heatmap" id="heatmap"></div>
    <div class="hm-labels" id="hmLabels"></div>
  </div>
  <div class="view" id="view-overview">
    <div style="font-size:22px;font-weight:700;margin-bottom:20px;letter-spacing:-0.5px">현황</div>
    <div class="overview-section"><div class="overview-title">과목별 진도</div><div id="ovSubjects"></div></div>
    <div class="overview-section">
      <div class="overview-title">전체 누적</div>
      <div class="ov-grid">
        <div class="ov-stat"><div class="ov-val" id="ovTotal">0</div><div class="ov-label">총 완료 태스크</div></div>
        <div class="ov-stat"><div class="ov-val" id="ovReview">0</div><div class="ov-label">총 복습 완료</div></div>
        <div class="ov-stat"><div class="ov-val" id="ovStreak">0일</div><div class="ov-label">연속 학습</div></div>
        <div class="ov-stat"><div class="ov-val" id="ovDays">0일</div><div class="ov-label">총 학습일</div></div>
      </div>
    </div>
  </div>
  <div class="view" id="view-setup">
    <div style="font-size:22px;font-weight:700;margin-bottom:20px;letter-spacing:-0.5px">설정</div>
    <div class="setup-card">
      <div class="setup-title">과목 목록</div>
      <div id="sjList"></div>
      <button class="btn-main" style="margin-top:10px" onclick="openAdd()">+ 과목 추가</button>
    </div>
    <div class="setup-card">
      <div class="setup-title">강의 완강 계산기</div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6">총 강의수와 목표일을 입력하면 하루 몇 강씩 들어야 하는지 계산해줘요.</p>
      <div class="fg"><div class="fl">총 강의수</div><input type="number" id="cTotal" placeholder="예: 60" min="1"></div>
      <div class="fg"><div class="fl">이미 완강한 수</div><input type="number" id="cDone" placeholder="0" min="0"></div>
      <div class="fg"><div class="fl">완강 목표일</div><input type="date" id="cTarget"></div>
      <button class="btn-main" onclick="calcLec()">계산하기</button>
      <div class="calc-result" id="cResult"></div>
    </div>
  </div>
</main>

<div class="modal-bg" id="sjModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-ttl" id="mTitle">과목 추가</div>
      <button class="modal-x" onclick="closeM()">✕</button>
    </div>
    <div class="fg"><div class="fl">과목명</div><input type="text" id="mName" placeholder="예: 수학"></div>
    <div class="fg"><div class="fl">색깔</div><div class="color-row" id="colorRow"></div></div>
    <div class="fg"><div class="fl">유형</div>
      <select id="mType" onchange="onTC()">
        <option value="lecture">강의형 (강의 순서대로)</option>
        <option value="textbook">교재형 (페이지/챕터 순서대로)</option>
        <option value="routine">루틴형 (매일 동일 작업)</option>
      </select>
    </div>
    <div id="cfgL">
      <div class="fg"><div class="fl">총 강의수</div><input type="number" id="mTotal" placeholder="예: 80" min="1"></div>
      <div class="fg"><div class="fl">현재까지 완강한 강의수</div><input type="number" id="mDone" value="0" min="0"></div>
      <div class="fg"><div class="fl">완강 목표일</div><input type="date" id="mTarget"></div>
    </div>
    <div id="cfgT" style="display:none">
      <div class="fg"><div class="fl">총 분량</div><input type="number" id="mTotalPg" placeholder="예: 300" min="1"></div>
      <div class="fg"><div class="fl">현재까지 완료한 분량</div><input type="number" id="mDonePg" value="0" min="0"></div>
      <div class="fg"><div class="fl">단위 (페이지, 챕터, 문제 등)</div><input type="text" id="mUnit" placeholder="예: 페이지"></div>
      <div class="fg"><div class="fl">목표일</div><input type="date" id="mTargetPg"></div>
    </div>
    <div id="cfgR" style="display:none">
      <div class="fg"><div class="fl">매일 할 내용</div><input type="text" id="mRoutine" placeholder="예: 독해 1지문 + 어휘 20개"></div>
    </div>
    <input type="hidden" id="mEid">
    <button class="btn-main" onclick="saveS()">저장</button>
    <div id="mDelRow" style="display:none;text-align:center;margin-top:10px">
      <button class="btn-del" onclick="delS()">이 과목 삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyCfHOEl_g5vvcVy7Shk10hS6leHoSJofjA",
  authDomain:"study-planner-5f4b3.firebaseapp.com",
  projectId:"study-planner-5f4b3",
  storageBucket:"study-planner-5f4b3.firebasestorage.app",
  messagingSenderId:"493466863153",
  appId:"1:493466863153:web:e57912f498a49c45cc3710",
  databaseURL:"https://study-planner-5f4b3-default-rtdb.firebaseio.com/"
});
const db = getDatabase(app);

const TODAY = new Date(Date.now()+9*3600000).toISOString().slice(0,10);
const DAY = ['일','월','화','수','목','금','토'];
const EB = [1,3,7,14,28];
const PAL = ['#2d6a2d','#1a5fa8','#7b2d8b','#b83232','#b87800','#0e7c7b','#5c3d99','#7a4419'];
const MAX_SKIP = 3;

let G = {subj:{}, rev:{}, logs:{}, ts:{}, skipN:0};
let queue = [];
let activeId = null;

(()=>{
  const d=new Date(TODAY+'T00:00:00Z');
  document.getElementById('todayDate').textContent=
    `${d.getUTCFullYear()}년 ${d.getUTCMonth()+1}월 ${d.getUTCDate()}일 ${DAY[d.getUTCDay()]}요일`;
})();

window.showView=(name,btn)=>{
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='overview') renderOV();
  if(name==='setup') renderSJList();
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

function openM(){document.getElementById('sjModal').classList.add('show');}
window.closeM=()=>document.getElementById('sjModal').classList.remove('show');

function renderCR(sel){
  document.getElementById('colorRow').innerHTML=PAL.map(c=>
    `<div class="cs ${c===sel?'on':''}" style="background:${c}" onclick="pickC('${c}',this)"></div>`
  ).join('');
}
window.pickC=(c,el)=>{
  document.querySelectorAll('.cs').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
};
function getC(){const el=document.querySelector('.cs.on');return el?el.style.background:PAL[0];}

window.onTC=()=>{
  const t=document.getElementById('mType').value;
  document.getElementById('cfgL').style.display=t==='lecture'?'block':'none';
  document.getElementById('cfgT').style.display=t==='textbook'?'block':'none';
  document.getElementById('cfgR').style.display=t==='routine'?'block':'none';
};

window.openAdd=()=>{
  document.getElementById('mTitle').textContent='과목 추가';
  ['mName','mTotal','mTarget','mTotalPg','mUnit','mTargetPg','mRoutine'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('mDone').value='0';
  document.getElementById('mDonePg').value='0';
  document.getElementById('mEid').value='';
  document.getElementById('mDelRow').style.display='none';
  document.getElementById('mType').value='lecture';
  renderCR(PAL[Object.keys(G.subj).length%PAL.length]);
  onTC(); openM();
};

window.openEdit=id=>{
  const s=G.subj[id];if(!s)return;
  document.getElementById('mTitle').textContent='과목 수정';
  document.getElementById('mName').value=s.name||'';
  document.getElementById('mType').value=s.type||'lecture';
  document.getElementById('mTotal').value=s.total||'';
  document.getElementById('mDone').value=s.done||0;
  document.getElementById('mTarget').value=s.target||'';
  document.getElementById('mTotalPg').value=s.totalPg||'';
  document.getElementById('mDonePg').value=s.donePg||0;
  document.getElementById('mUnit').value=s.unit||'';
  document.getElementById('mTargetPg').value=s.targetPg||'';
  document.getElementById('mRoutine').value=s.routine||'';
  document.getElementById('mEid').value=id;
  document.getElementById('mDelRow').style.display='block';
  renderCR(s.color||PAL[0]);
  onTC(); openM();
};

window.saveS=async()=>{
  const name=document.getElementById('mName').value.trim();
  if(!name){toast('과목명을 입력해주세요');return;}
  const type=document.getElementById('mType').value;
  const color=getC();
  const eid=document.getElementById('mEid').value;
  let data={name,type,color};
  if(type==='lecture'){
    const total=parseInt(document.getElementById('mTotal').value)||0;
    const done=parseInt(document.getElementById('mDone').value)||0;
    const target=document.getElementById('mTarget').value;
    if(!total||!target){toast('총 강의수와 목표일을 입력해주세요');return;}
    data={...data,total,done,target};
  } else if(type==='textbook'){
    const totalPg=parseInt(document.getElementById('mTotalPg').value)||0;
    const donePg=parseInt(document.getElementById('mDonePg').value)||0;
    const unit=document.getElementById('mUnit').value.trim()||'페이지';
    const targetPg=document.getElementById('mTargetPg').value;
    if(!totalPg||!targetPg){toast('총 분량과 목표일을 입력해주세요');return;}
    data={...data,totalPg,donePg,unit,targetPg};
  } else {
    const routine=document.getElementById('mRoutine').value.trim();
    if(!routine){toast('매일 할 내용을 입력해주세요');return;}
    data={...data,routine};
  }
  const id=eid||('s'+Date.now());
  await set(ref(db,'subjects/'+id),data);
  G.subj[id]=data;
  closeM(); renderSJList(); buildQ(); renderToday();
  toast(eid?'수정됐어요':'과목이 추가됐어요');
};

window.delS=async()=>{
  const id=document.getElementById('mEid').value;if(!id)return;
  await remove(ref(db,'subjects/'+id));
  delete G.subj[id];
  closeM(); renderSJList(); buildQ(); renderToday();
  toast('삭제됐어요');
};

function renderSJList(){
  const el=document.getElementById('sjList');
  const entries=Object.entries(G.subj);
  if(!entries.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;padding:4px 0">아직 과목이 없어요</div>';return;}
  el.innerHTML=entries.map(([id,s])=>`
    <div class="sj-item">
      <div class="sj-dot" style="background:${s.color}"></div>
      <div style="flex:1"><div class="sj-name">${s.name}</div><div class="sj-type">${s.type==='lecture'?'강의형':s.type==='textbook'?'교재형':'루틴형'}</div></div>
      <button class="sj-edit" onclick="openEdit('${id}')">편집</button>
    </div>`).join('');
}

function calcAlloc(s){
  if(s.type==='routine') return {perDay:1,unit:'회',label:s.routine};
  const total=s.type==='lecture'?s.total:s.totalPg;
  const done=s.type==='lecture'?(s.done||0):(s.donePg||0);
  const target=s.type==='lecture'?s.target:s.targetPg;
  const unit=s.type==='lecture'?'강':(s.unit||'');
  if(!total||!target)return null;
  const rem=total-done;if(rem<=0)return null;
  const days=Math.max(1,Math.ceil((new Date(target+'T00:00:00Z')-new Date(TODAY+'T00:00:00Z'))/86400000));
  return {perDay:Math.ceil(rem/days),unit,rem,days,done,total};
}

function buildQ(){
  queue=[];
  Object.entries(G.rev).forEach(([rid,r])=>{
    if(r.status==='pending'&&r.schedDate<=TODAY){
      const skip=G.ts[rid]?.skip||0;
      queue.push({...r,id:rid,kind:'review',priority:100+r.stageIdx+skip*8});
    }
  });
  Object.entries(G.subj).forEach(([sid,s])=>{
    const alloc=calcAlloc(s);if(!alloc)return;
    const tid='new_'+sid+'_'+TODAY;
    const st=G.ts[tid]||{};
    if(st.done)return;
    const skip=st.skip||0;
    queue.push({id:tid,kind:'new',subjectId:sid,priority:50+skip*8,alloc,st});
  });
  queue.sort((a,b)=>b.priority-a.priority);
}

function renderToday(){
  const pending=queue.filter(t=>t.kind==='review'?t.status!=='done':!t.st?.done);
  if(!Object.keys(G.subj).length){
    document.getElementById('todayContent').innerHTML='<div class="empty-state">설정에서 과목을 추가하면<br>오늘 할 것이 자동으로 나타나요</div>';
    renderHM(); updateStats(); return;
  }
  if(!pending.length){
    document.getElementById('todayContent').innerHTML=`<div class="all-done"><div class="all-done-icon">🌿</div><div class="all-done-title">오늘 할 것 다 했어요</div><div class="all-done-sub">오늘도 수고했어요</div></div>`;
    renderHM(); updateStats(); return;
  }
  const revs=pending.filter(t=>t.kind==='review');
  const news=pending.filter(t=>t.kind==='new');
  const shown=[];
  let html='';
  if(revs.length){const t=revs[0];shown.push(t.id);html+='<div class="section-label">복습</div>'+cardHTML(t);}
  const nShow=news.slice(0,revs.length?2:3);
  if(nShow.length){
    html+=`<div class="section-label" style="margin-top:${revs.length?'16px':'0'}">학습</div>`;
    nShow.forEach(t=>{shown.push(t.id);html+=cardHTML(t);});
  }
  const rest=pending.filter(t=>!shown.includes(t.id));
  if(rest.length){
    html+='<div class="section-label" style="margin-top:16px">대기 중</div>';
    rest.slice(0,4).forEach(t=>{
      const s=G.subj[t.subjectId]||{};
      const lbl=t.kind==='review'?`${t.subjName} — ${t.stageIdx+1}단계 복습`:`${s.name||''} — 오늘 학습`;
      html+=`<div class="queue-item"><div class="queue-dot" style="background:${s.color||t.color||'#aaa'}"></div><div class="queue-text">${lbl}</div></div>`;
    });
  }
  document.getElementById('todayContent').innerHTML=html;
  renderHM(); updateStats();
}

function cardHTML(t){
  const isActive=activeId===t.id;
  const skipLeft=MAX_SKIP-(G.skipN||0);
  const skipDis=skipLeft<=0?'disabled':'';
  let color,subName,title,sub='';
  if(t.kind==='review'){
    color=t.color||'#888'; subName=t.subjName||'';
    title=t.sourceTitle||'';
    sub=`${t.stageIdx+1}단계 복습 (${EB[t.stageIdx]}일차)`;
  } else {
    const s=G.subj[t.subjectId]||{};
    color=s.color||'#888'; subName=s.name||'';
    const a=t.alloc;
    if(s.type==='lecture'){title=`오늘 ${a.perDay}강`;sub=`${s.done||0}강 완료 / 총 ${s.total}강`;}
    else if(s.type==='textbook'){title=`오늘 ${a.perDay}${a.unit}`;sub=`${s.donePg||0} 완료 / 총 ${s.totalPg} ${a.unit}`;}
    else {title=s.routine||'';}
  }
  if(isActive){
    return `<div class="task-card active-card" id="tc${t.id.replace(/[^a-z0-9]/gi,'_')}">
      <div class="task-subject" style="color:${color}">${subName}</div>
      <div class="task-title">${title}</div>
      ${sub?`<div class="task-sub">${sub}</div>`:'<div class="task-spacer"></div>'}
      <div class="btn-row"><button class="btn-complete" onclick="completeT('${t.id}')">완료</button></div>
    </div>`;
  }
  return `<div class="task-card" id="tc${t.id.replace(/[^a-z0-9]/gi,'_')}" style="border-left-color:${color}">
    <div class="task-subject" style="color:${color}">${subName}</div>
    <div class="task-title">${title}</div>
    ${sub?`<div class="task-sub">${sub}</div>`:'<div class="task-spacer"></div>'}
    <div class="btn-row">
      <button class="btn-start" onclick="startT('${t.id}')">시작</button>
      <button class="btn-skip" onclick="skipT('${t.id}')" ${skipDis}>건너뛰기</button>
      ${skipLeft>0?`<span class="skip-count">건너뛰기 ${skipLeft}회 남음</span>`:`<span class="skip-out">건너뛰기 소진</span>`}
    </div>
  </div>`;
}

window.startT=id=>{activeId=id;renderToday();};

window.completeT=async id=>{
  activeId=null;
  const t=queue.find(x=>x.id===id);if(!t)return;
  if(t.kind==='new'){
    const s=G.subj[t.subjectId];if(!s)return;
    if(s.type==='lecture'){
      const nd=(s.done||0)+1;
      await update(ref(db,'subjects/'+t.subjectId),{done:nd});
      G.subj[t.subjectId].done=nd;
      const st=G.ts[id]||{};
      const cnt=(st.cnt||0)+1;
      G.ts[id]={...st,cnt};
      await set(ref(db,'taskState/'+id),G.ts[id]);
      if(cnt>=t.alloc.perDay){
        G.ts[id].done=true;
        await update(ref(db,'taskState/'+id),{done:true});
        await makeRev(t.subjectId,s.name,`${s.name} ${nd}강`,0);
        toast(`${s.name} ${nd}강 완료 ↻`);
      } else {
        toast(`${s.name} ${nd}강 완료 (${cnt}/${t.alloc.perDay}강)`);
      }
    } else if(s.type==='textbook'){
      const nd=(s.donePg||0)+1;
      await update(ref(db,'subjects/'+t.subjectId),{donePg:nd});
      G.subj[t.subjectId].donePg=nd;
      G.ts[id]={done:true};
      await set(ref(db,'taskState/'+id),{done:true});
      await makeRev(t.subjectId,s.name,`${s.name} ${nd}${s.unit||''}`,0);
      toast(`${s.name} ${nd}${s.unit||''} 완료 ↻`);
    } else {
      G.ts[id]={done:true};
      await set(ref(db,'taskState/'+id),{done:true});
      toast(`${s.name} 오늘 루틴 완료`);
    }
  } else {
    await update(ref(db,'reviews/'+id),{status:'done',doneAt:TODAY});
    G.rev[id].status='done';
    const ni=t.stageIdx+1;
    if(ni<EB.length){
      await makeRev(t.subjectId,t.subjName,t.sourceTitle,ni);
      toast(`복습 완료! 다음 복습 +${EB[ni]}일`);
    } else {toast('모든 복습 단계 완료 🎉');}
  }
  await logDay();
  buildQ(); renderToday();
};

async function makeRev(subjId,subjName,sourceTitle,stageIdx){
  const stage=EB[stageIdx];
  const s=G.subj[subjId]||{};
  const rid='r'+Date.now()+Math.random().toString(36).slice(2,5);
  const data={subjectId:subjId,subjName,color:s.color||'#888',sourceTitle,stage,stageIdx,status:'pending',schedDate:TODAY,createdAt:TODAY};
  await set(ref(db,'reviews/'+rid),data);
  G.rev[rid]=data;
}

window.skipT=async id=>{
  if((G.skipN||0)>=MAX_SKIP)return;
  G.skipN=(G.skipN||0)+1;
  await set(ref(db,'skipToday/'+TODAY),G.skipN);
  const idx=queue.findIndex(x=>x.id===id);if(idx<0)return;
  const [t]=queue.splice(idx,1);
  const st=G.ts[id]||{};
  st.skip=(st.skip||0)+1;
  G.ts[id]=st;
  await update(ref(db,'taskState/'+id),{skip:st.skip});
  queue.push({...t,priority:t.priority-20});
  toast(`건너뜀 (오늘 ${G.skipN}/${MAX_SKIP}회)`);
  renderToday();
};

function renderHM(){
  let hm='',lb='';
  for(let i=6;i>=0;i--){
    const d=new Date(Date.now()+9*3600000-i*86400000);
    const ds=d.toISOString().slice(0,10);
    let cls='hm-day';
    if(ds===TODAY)cls+=' today';
    else if(G.logs[ds]?.ok)cls+=' done';
    hm+=`<div class="${cls}"></div>`;
    lb+=`<div class="hm-label">${DAY[d.getDay()]}</div>`;
  }
  document.getElementById('heatmap').innerHTML=hm;
  document.getElementById('hmLabels').innerHTML=lb;
}

function updateStats(){
  let streak=0;
  for(let i=0;i<=400;i++){
    const ds=new Date(Date.now()+9*3600000-i*86400000).toISOString().slice(0,10);
    if(ds===TODAY||G.logs[ds]?.ok)streak++;
    else break;
  }
  const revDone=Object.values(G.rev).filter(r=>r.status==='done').length;
  const tDone=Object.values(G.ts).filter(t=>t.done).length;
  document.getElementById('sStreak').textContent=streak+'일';
  document.getElementById('sTotal').textContent=tDone;
  document.getElementById('sReview').textContent=revDone;
}

async function logDay(){
  await set(ref(db,'logs/'+TODAY),{ok:true,ts:Date.now()});
  G.logs[TODAY]={ok:true};
}

async function renderOV(){
  const el=document.getElementById('ovSubjects');
  const entries=Object.entries(G.subj);
  if(!entries.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">아직 과목이 없어요</div>';}
  else{
    el.innerHTML=entries.map(([,s])=>{
      let cur=0,total=1,unit='';
      if(s.type==='lecture'){cur=s.done||0;total=s.total||1;unit='강';}
      else if(s.type==='textbook'){cur=s.donePg||0;total=s.totalPg||1;unit=s.unit||'';}
      const pct=s.type==='routine'?100:Math.min(100,Math.round(cur/total*100));
      const lbl=s.type==='routine'?'루틴형':`${cur} / ${total} ${unit}`;
      return `<div class="sp-item">
        <div class="sp-header"><span class="sp-name">${s.name}</span><span class="sp-count">${lbl}</span></div>
        <div class="sp-bar-bg"><div class="sp-bar" style="width:${pct}%;background:${s.color}"></div></div>
      </div>`;
    }).join('');
  }
  const revDone=Object.values(G.rev).filter(r=>r.status==='done').length;
  const tDone=Object.values(G.ts).filter(t=>t.done).length;
  const totalDays=Object.keys(G.logs).filter(d=>G.logs[d]?.ok).length;
  let streak=0;
  for(let i=0;i<=400;i++){
    const ds=new Date(Date.now()+9*3600000-i*86400000).toISOString().slice(0,10);
    if(ds===TODAY||G.logs[ds]?.ok)streak++;
    else break;
  }
  document.getElementById('ovTotal').textContent=tDone;
  document.getElementById('ovReview').textContent=revDone;
  document.getElementById('ovStreak').textContent=streak+'일';
  document.getElementById('ovDays').textContent=totalDays+'일';
}

window.calcLec=()=>{
  const total=parseInt(document.getElementById('cTotal').value)||0;
  const done=parseInt(document.getElementById('cDone').value)||0;
  const target=document.getElementById('cTarget').value;
  const el=document.getElementById('cResult');
  if(!total||!target){toast('총 강의수와 목표일을 입력해주세요');return;}
  const rem=total-done;
  const days=Math.max(1,Math.ceil((new Date(target+'T00:00:00Z')-new Date(TODAY+'T00:00:00Z'))/86400000));
  el.style.display='block';
  el.innerHTML=`남은 강의 <strong>${rem}강</strong> ÷ <strong>${days}일</strong> = 하루 <strong>${Math.ceil(rem/days)}강</strong>`;
};

async function init(){
  const [s,r,l,ts,sk]=await Promise.all([
    get(ref(db,'subjects')),
    get(ref(db,'reviews')),
    get(ref(db,'logs')),
    get(ref(db,'taskState')),
    get(ref(db,'skipToday/'+TODAY))
  ]);
  G.subj=s.exists()?s.val():{};
  G.rev=r.exists()?r.val():{};
  G.logs=l.exists()?l.val():{};
  G.ts=ts.exists()?ts.val():{};
  G.skipN=sk.exists()?sk.val():0;
  buildQ(); renderToday();
}
init();
</script>
</body>
</html>
